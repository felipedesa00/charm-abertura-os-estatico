<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ordem de Serviço</title>

  <script src="//api.bitrix24.com/api/v1/"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['DM Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          },
          colors: {
            brand: {
              50:  '#eff6ff',
              100: '#dbeafe',
              500: '#2563eb',
              600: '#1d4ed8',
              700: '#1e40af',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f1f5f9;
      overflow-x: hidden;
      min-height: 100vh;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    /* ── Input phone ── */
    #telefone::placeholder { color: #94a3b8; }

    /* ── Fade-in para cards ── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .card-anim {
      animation: fadeSlideIn 0.25s ease both;
    }
    .card-anim:nth-child(2) { animation-delay: 0.06s; }
    .card-anim:nth-child(3) { animation-delay: 0.12s; }
    .card-anim:nth-child(4) { animation-delay: 0.18s; }

    /* ── Spinner ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    /* ── Badge pill ── */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }
    .badge-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* Tipo de entidade */
    .badge-contact  { background:#bfdbfe; color:#1e3a8a; }
    .badge-deal     { background:#bbf7d0; color:#14532d; }
    .badge-lead     { background:#ddd6fe; color:#4c1d95; }
    .badge-repeat   { background:#fed7aa; color:#7c2d12; border: 1px solid #fb923c44; }
    .badge-lost     { background:#fecaca; color:#7f1d1d; }

    /* Stage (etapa) — neutral slate, legível */
    .badge-stage    { background:#e2e8f0; color:#1e293b; border: 1px solid #cbd5e1; }

    /* Override para etapas com cor do CRM — força texto escuro quando fundo é claro */
    .badge-stage[style] { color: inherit; }

    /* ── Hover card ── */
    .entity-card {
      background: #fff;
      border: 1px solid #e2e8f0;
      border-radius: 14px;
      overflow: hidden;
      transition: box-shadow 0.18s, border-color 0.18s;
    }
    .entity-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); border-color: #bfdbfe; }

    .child-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 14px;
      border-radius: 10px;
      background: #f8fafc;
      border: 1px solid #f1f5f9;
      transition: background 0.15s, border-color 0.15s;
    }
    .child-row:hover { background: #f0f9ff; border-color: #bae6fd; }
    .child-row--repeat:hover { background: #fff7ed; border-color: #fed7aa; }

    /* ── Open button ── */
    .btn-open {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      color: #2563eb;
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s, color 0.15s;
    }
    .btn-open:hover { background: #dbeafe; color: #1d4ed8; }

    /* ── Empty state ── */
    .empty-children {
      font-size: 12px;
      color: #94a3b8;
      font-style: italic;
      padding: 6px 0 2px 0;
    }

    /* ── Pulse loader row ── */
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.2s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>

<body class="p-4 md:p-6">

  <div class="max-w-2xl mx-auto space-y-4">

    <!-- ── Header ── -->
    <div class="flex items-center gap-3 px-1">
      <div class="w-9 h-9 rounded-xl bg-brand-600 flex items-center justify-center shadow-sm flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
        </svg>
      </div>
      <div>
        <h1 class="text-base font-semibold text-slate-800 leading-tight">Abertura de Ordem de Serviço</h1>
        <p class="text-xs text-slate-400">Identificação do cliente no CRM</p>
      </div>
    </div>

    <!-- ── Search card ── -->
    <div class="bg-white rounded-2xl border border-slate-200 shadow-sm p-5">
      <label for="telefone" class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">
        Telefone do cliente
      </label>

      <div class="flex gap-2">
        <div class="relative flex-1">
          <span class="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/>
            </svg>
          </span>
          <input
            type="text"
            id="telefone"
            placeholder="+55 11 99999-9999"
            maxlength="20"
            autocomplete="off"
            class="w-full pl-10 pr-4 py-3 font-mono text-base text-slate-800 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent transition-all placeholder:text-slate-400"
          />
        </div>

        <button
          id="btn-buscar"
          onclick="iniciarFluxoBusca()"
          class="flex items-center gap-2 px-5 py-3 bg-brand-600 hover:bg-brand-700 active:bg-brand-700 text-white text-sm font-semibold rounded-xl transition-colors shadow-sm disabled:opacity-60 disabled:cursor-not-allowed"
        >
          <span id="btn-icon">
            <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.65 16.65a7.5 7.5 0 0012 0z"/>
            </svg>
          </span>
          <span id="btn-text">Buscar</span>
        </button>
      </div>

      <p class="text-xs text-slate-400 mt-2.5">Digite apenas números — a formatação é automática.</p>
    </div>

    <!-- ── Status / loader ── -->
    <div id="status-msg" class="hidden px-1">
      <div class="flex items-center gap-3 text-sm text-slate-500">
        <div class="skeleton h-4 w-4 rounded-full flex-shrink-0"></div>
        <span id="status-text">Consultando CRM...</span>
      </div>
    </div>

    <!-- ── Results ── -->
    <div id="resultado-container" class="space-y-3"></div>

  </div><!-- /max-w -->

  <script>
    // ============================================================
    // 📞 TELEFONE — formatação visual + extração limpa
    // ============================================================
    const inputTelefone = document.getElementById('telefone');

    function extrairDigitos(str) { return str.replace(/\D/g, ''); }

    function formatarVisual(digits) {
      if (!digits) return '';
      if (!digits.startsWith('55')) digits = '55' + digits;
      const ddd   = digits.slice(2, 4);
      const resto = digits.slice(4);
      let num = resto;
      if (resto.length === 9) num = `${resto.slice(0,5)}-${resto.slice(5)}`;
      else if (resto.length === 8) num = `${resto.slice(0,4)}-${resto.slice(4)}`;
      if (!ddd)   return '+55';
      if (!resto) return `+55 ${ddd}`;
      return `+55 ${ddd} ${num}`;
    }

    inputTelefone.value = '+55';

    inputTelefone.addEventListener('input', function () {
      this.value = formatarVisual(extrairDigitos(this.value));
    });
    inputTelefone.addEventListener('paste', function (e) {
      e.preventDefault();
      this.value = formatarVisual(extrairDigitos((e.clipboardData || window.clipboardData).getData('text')));
    });
    inputTelefone.addEventListener('keydown', function (e) {
      const nav = ['Backspace','Delete','ArrowLeft','ArrowRight','Tab'];
      if (e.key === 'Enter') { e.preventDefault(); iniciarFluxoBusca(); return; }
      if (!(e.key >= '0' && e.key <= '9') && !nav.includes(e.key)) e.preventDefault();
    });

    function getTelefones() {
      const d = extrairDigitos(inputTelefone.value);
      return { semMais: d, comMais: d ? `+${d}` : '' };
    }


    // ============================================================
    // 🔧 UTILS
    // ============================================================
    function getData90DiasAtras() {
      const d = new Date(); d.setDate(d.getDate() - 90); return d.toISOString();
    }
    function deduplicarPorId(arr) {
      const s = new Set(); return arr.filter(i => { if (s.has(i.id)) return false; s.add(i.id); return true; });
    }


    // ============================================================
    // 📚 RESOLUÇÃO DE STAGES — direto via crm.status.list
    //
    // Os items do crm.item.list já trazem tudo necessário:
    //   item.entityTypeId → entidade (1=lead, 2=deal...)
    //   item.categoryId   → pipeline (0=padrão, 1, 2...)
    //   item.stageId      → código da etapa (ex: "2", "NEW")
    //
    // ENTITY_ID para o crm.status.list:
    //   lead  (entityTypeId=1):            "STATUS"
    //   deal  (entityTypeId=2, cat=0):     "DEAL_STAGE"
    //   deal  (entityTypeId=2, cat=N):     "DEAL_STAGE_N"
    //
    // Um único callBatch resolve todas as etapas pendentes de uma vez.
    // Cache por chave "entityTypeId:categoryId:stageId".
    // ============================================================

    const stageCache = {};

    function stageEntityId(entityTypeId, categoryId) {
      if (entityTypeId === 1) return 'STATUS';
      const cat = parseInt(categoryId, 10) || 0;
      return cat === 0 ? 'DEAL_STAGE' : `DEAL_STAGE_${cat}`;
    }

    function stageCacheKey(item) {
      const typeId = item.entityTypeId ?? 0;
      const catId  = item.categoryId  ?? 0;
      return `${typeId}:${catId}:${item.stageId}`;
    }

    async function resolverStagesDeItems(items, entityTypeId) {
      if (!items || items.length === 0) return;

      // Filtra combinações ainda não resolvidas
      const pendentes = items.filter(i => i.stageId && !(stageCacheKey({ ...i, entityTypeId }) in stageCache));
      if (pendentes.length === 0) return;

      // Um callBatch com uma entrada por combinação única
      const calls = {};
      for (const item of pendentes) {
        const key      = stageCacheKey({ ...item, entityTypeId });
        const catId    = item.categoryId ?? 0;
        const entityId = stageEntityId(entityTypeId, catId);
        calls[key] = {
          method: 'crm.status.list',
          params: { filter: { ENTITY_ID: entityId, STATUS_ID: String(item.stageId) } }
        };
      }

      const results = await apiBatch(calls);

      for (const key in results) {
        const lista = results[key];
        const s = Array.isArray(lista) ? lista[0] : null;
        stageCache[key] = s
          ? { name: s.NAME || key, color: s.EXTRA?.COLOR || s.COLOR || null }
          : { name: String(key.split(':')[2]), color: null };
      }
    }

    function getStageEntry(item, entityTypeId) {
      return stageCache[stageCacheKey({ ...item, entityTypeId })] || null;
    }


    // ============================================================
    // 🔍 BUSCA POR TELEFONE — callBatch com/sem + em paralelo
    // ============================================================
    async function buscarPorTelefone(entityTypeId, extraFilter, { semMais, comMais }, select) {
      const extra = select ? { select } : {};
      const res = await apiBatch({
        comMais: { method: 'crm.item.list', params: { entityTypeId, filter: { ...extraFilter, phone: comMais }, ...extra } },
        semMais: { method: 'crm.item.list', params: { entityTypeId, filter: { ...extraFilter, phone: semMais }, ...extra } },
      });
      return deduplicarPorId([...(res.comMais?.items||[]), ...(res.semMais?.items||[])]);
    }


    // ============================================================
    // 🧠 FLUXO PRINCIPAL
    // ============================================================
    async function iniciarFluxoBusca() {
      if (!bx24Ready) { alert('Aguarde — o aplicativo ainda está inicializando.'); return; }
      const tel = getTelefones();
      if (tel.semMais.length < 8) { alert('Insira um telefone válido (mínimo 8 dígitos).'); return; }

      const btn  = document.getElementById('btn-buscar');
      const icon = document.getElementById('btn-icon');
      const txt  = document.getElementById('btn-text');
      const cont = document.getElementById('resultado-container');
      const stat = document.getElementById('status-msg');
      const stxt = document.getElementById('status-text');

      btn.disabled = true;
      icon.innerHTML = '<span class="spinner"></span>';
      txt.textContent = 'Buscando...';
      cont.innerHTML  = '';
      stxt.textContent = 'Consultando o CRM...';
      stat.classList.remove('hidden');

      try {
        const data90 = getData90DiasAtras();

        // ── Etapa 1: Contatos pelo telefone ──
        const contatos = await buscarPorTelefone(3, {}, tel, ['id','name','secondName','lastName','title','phone','ufCrmCpf']);

        if (contatos.length > 0) {
          stat.classList.add('hidden');

          for (const contato of contatos) {
            stxt.textContent = `Buscando registros de "${contato.title || contato.name}"...`;

            // Busca negócios e leads vinculados em paralelo
            const [resNegocios, resLeadsVinc] = await Promise.all([
              apiCall('crm.item.list', { entityTypeId: 2, filter: { contactId: contato.id, stageSemanticId: 'P' }, select: ['*', 'ufCrm_1637007838'] }),
              apiCall('crm.item.list', { entityTypeId: 1, filter: { contactId: contato.id, stageSemanticId: 'P' } }),
            ]);

            const negocios  = resNegocios?.items || [];
            const leadsVinc = resLeadsVinc?.items || [];

            // Resolve nomes das etapas dinamicamente pelos items encontrados
            await Promise.all([
              resolverStagesDeItems(negocios, 2),
              resolverStagesDeItems(leadsVinc, 1),
            ]);

            cont.innerHTML += renderContatoCard(contato, negocios, leadsVinc);
          }

        } else {
          // ── Etapa 3: Leads soltos em andamento ──
          stxt.textContent = 'Buscando leads...';
          const leadsAnd = await buscarPorTelefone(1, { stageSemanticId: 'P' }, tel);

          stat.classList.add('hidden');

          if (leadsAnd.length > 0) {
            await resolverStagesDeItems(leadsAnd, 1);
            cont.innerHTML = leadsAnd.map(l => renderLeadSoltoCard(l, false)).join('');
          } else {
            // ── Etapa 4: Leads perdidos 90d ──
            const leadsPerd = await buscarPorTelefone(1, { stageSemanticId: 'F', '>=movedTime': data90 }, tel);
            if (leadsPerd.length > 0) {
              await resolverStagesDeItems(leadsPerd, 1);
              cont.innerHTML = leadsPerd.map(l => renderLeadSoltoCard(l, true)).join('');
            } else {
              cont.innerHTML = renderVazio();
            }
          }
        }

      } catch (err) {
        console.error('Erro no fluxo:', err);
        cont.innerHTML = renderErro();
      } finally {
        stat.classList.add('hidden');
        btn.disabled = false;
        icon.innerHTML = `<svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.65 16.65a7.5 7.5 0 0012 0z"/></svg>`;
        txt.textContent = 'Buscar';
      }
    }


    // ============================================================
    // 🎨 RENDERERS
    // ============================================================

    function getPath(typeId, id) {
      return `/crm/${{1:'lead',2:'deal',3:'contact',4:'company'}[typeId]||'deal'}/details/${id}/`;
    }

    window.abrirSlider = function(path) {
      BX24.openPath(path, r => { if (r?.error) console.error('Slider:', r.error); });
    };

    // Badge HTML helpers
    function badgeEntity(label, type) {
      const cls = { contact:'badge-contact', deal:'badge-deal', lead:'badge-lead', repeat:'badge-repeat', lost:'badge-lost' }[type] || 'badge-stage';
      return `<span class="badge ${cls}">${label}</span>`;
    }

    function badgeStageFromEntry(entry, stageId) {
      const name = entry?.name || String(stageId || '');
      if (!name) return '';

      if (entry?.color) {
        const hex = entry.color.startsWith('#') ? entry.color : `#${entry.color}`;
        const r = parseInt(hex.slice(1,3),16);
        const g = parseInt(hex.slice(3,5),16);
        const b = parseInt(hex.slice(5,7),16);
        const lum = (0.299*r + 0.587*g + 0.114*b) / 255;
        const textFallback = lum > 0.55 ? '#1e3a5f' : hex;
        return `<span class="badge badge-stage" style="background:${hex}28; color:${textFallback}; border-color:${hex}55;">
          <span class="badge-dot" style="background:${hex}"></span>
          ${escHtml(name)}
        </span>`;
      }

      return `<span class="badge badge-stage">
        <span class="badge-dot" style="background:#94a3b8"></span>
        ${escHtml(name)}
      </span>`;
    }

    function escHtml(s) {
      return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function btnAbrir(path, label = 'Abrir') {
      return `<button onclick="abrirSlider('${path}')" class="btn-open">
        ${label}
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
        </svg>
      </button>`;
    }


    // ── Card de CONTATO com filhos ──
    function renderContatoCard(contato, negocios, leadsVinc) {
      // Monta nome completo: name + lastName (secondName opcionalmente no meio)
      const partes = [contato.name, contato.secondName, contato.lastName].filter(Boolean);
      const nomeCompleto = partes.length > 0 ? partes.join(' ') : (contato.title || `Contato #${contato.id}`);
      const title = escHtml(nomeCompleto);
      const path  = getPath(3, contato.id);

      // Flags para habilitar botão "Abrir OS" nos negócios
      const temCpf  = !!contato.ufCrmCpf;
      const temNome = !!(contato.name && contato.lastName);
      const canOpenOS = temCpf && temNome;

      // CPF formatado para exibição
      const cpfHtml = contato.ufCrmCpf
        ? `<p class="text-xs text-slate-500 font-mono mt-0.5">CPF: ${escHtml(contato.ufCrmCpf)}</p>`
        : '';

      let filhosHtml = '';

      const filhosNegocios   = negocios.map(n => renderNegocioRow(n, contato.id, canOpenOS)).join('');
      const filhosLeadsRepet = leadsVinc.map(l => renderLeadRepetidoRow(l)).join('');

      if (filhosNegocios || filhosLeadsRepet) {
        filhosHtml = filhosNegocios + filhosLeadsRepet;
      } else {
        filhosHtml = `<p class="empty-children">Nenhum negócio ou lead em andamento vinculado.</p>`;
      }

      return `
        <div class="entity-card card-anim">
          <!-- Header do contato -->
          <div class="px-5 py-4 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 text-blue-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                </svg>
              </div>
              <div class="min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  ${badgeEntity('Contato', 'contact')}
                  <span class="text-xs text-slate-400 font-mono">#${contato.id}</span>
                </div>
                <p class="text-sm font-semibold text-slate-800 mt-0.5 truncate">${title}</p>
                ${cpfHtml}
              </div>
            </div>
            ${btnAbrir(path, 'Ver ficha')}
          </div>

          <!-- Separador -->
          <div class="mx-5 border-t border-slate-100"></div>

          <!-- Filhos -->
          <div class="px-5 py-4">
            <p class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Registros vinculados</p>
            <div class="space-y-2">${filhosHtml}</div>
          </div>
        </div>`;
    }


    // ── Row de NEGÓCIO vinculado ──
    function renderNegocioRow(negocio, contatoId = null, canOpenOS = false) {
      const title = escHtml(negocio.title || `Negócio #${negocio.id}`);
      const path  = getPath(2, negocio.id);
      const stage = badgeStageFromEntry(getStageEntry(negocio, 2), negocio.stageId);

      // Botão "Abrir OS": visível se contato tem CPF+nome e negócio não tem número do pedido
      const pedidoVazio = !negocio.ufCrm_1637007838;
      const btnOS = (canOpenOS && pedidoVazio && contatoId)
        ? `<a href="abrir-os.html?dealId=${negocio.id}&contactId=${contatoId}" class="btn-open" style="background:#f0fdf4;color:#16a34a;border-color:#bbf7d0;">
             Abrir OS
             <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
               <path stroke-linecap="round" stroke-linejoin="round" d="M12 4v16m8-8H4"/>
             </svg>
           </a>`
        : '';

      return `
        <div class="child-row">
          <div class="flex items-center gap-2.5 min-w-0 flex-wrap">
            ${badgeEntity('Negócio', 'deal')}
            ${stage}
            <span class="text-xs text-slate-400 font-mono flex-shrink-0">#${negocio.id}</span>
            <span class="text-sm font-medium text-slate-700 truncate">${title}</span>
          </div>
          <div class="flex items-center gap-2 flex-shrink-0">
            ${btnOS}
            ${btnAbrir(path)}
          </div>
        </div>`;
    }


    // ── Row de LEAD REPETIDO vinculado ao contato ──
    function renderLeadRepetidoRow(lead) {
      const title = escHtml(lead.title || `Lead #${lead.id}`);
      const path  = getPath(1, lead.id);
      const stage = badgeStageFromEntry(getStageEntry(lead, 1), lead.stageId);

      return `
        <div class="child-row child-row--repeat">
          <div class="flex items-center gap-2.5 min-w-0 flex-wrap">
            ${badgeEntity('Lead Repetido', 'repeat')}
            ${stage}
            <span class="text-xs text-slate-400 font-mono flex-shrink-0">#${lead.id}</span>
            <span class="text-sm font-medium text-slate-700 truncate">${title}</span>
          </div>
          ${btnAbrir(path)}
        </div>`;
    }


    // ── Card de LEAD SOLTO (sem contato) ──
    function renderLeadSoltoCard(lead, perdido) {
      const title = escHtml(lead.title || `Lead #${lead.id}`);
      const path  = getPath(1, lead.id);
      const stage = badgeStageFromEntry(getStageEntry(lead, 1), lead.stageId);
      const tipo  = perdido
        ? badgeEntity('Lead perdido', 'lost')
        : badgeEntity('Lead', 'lead');

      return `
        <div class="entity-card card-anim">
          <div class="px-5 py-4 flex items-center justify-between gap-3">
            <div class="flex items-center gap-3 min-w-0">
              <div class="w-8 h-8 rounded-full ${perdido ? 'bg-red-50' : 'bg-purple-50'} flex items-center justify-center flex-shrink-0">
                <svg class="w-4 h-4 ${perdido ? 'text-red-400' : 'text-purple-400'}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
                </svg>
              </div>
              <div class="min-w-0">
                <div class="flex items-center gap-2 flex-wrap">
                  ${tipo}
                  ${stage}
                  <span class="text-xs text-slate-400 font-mono">#${lead.id}</span>
                </div>
                <p class="text-sm font-semibold text-slate-800 mt-0.5 truncate">${title}</p>
              </div>
            </div>
            ${btnAbrir(path, 'Ver ficha')}
          </div>
        </div>`;
    }


    // ── Vazio ──
    function renderVazio() {
      return `
        <div class="card-anim bg-white rounded-2xl border border-slate-200 p-8 text-center">
          <div class="w-12 h-12 rounded-2xl bg-amber-50 flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6 text-amber-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.8">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-4.35-4.35m0 0A7.5 7.5 0 104.65 16.65a7.5 7.5 0 0012 0z"/>
            </svg>
          </div>
          <p class="text-sm font-semibold text-slate-700">Nenhum registro encontrado</p>
          <p class="text-xs text-slate-400 mt-1 mb-5">Nenhum contato, negócio ou lead com este número.</p>
          <div class="flex justify-center gap-2">
            <button class="px-4 py-2 bg-amber-500 hover:bg-amber-600 text-white text-xs font-semibold rounded-lg transition-colors">
              + Novo Lead
            </button>
            <button class="px-4 py-2 bg-slate-800 hover:bg-slate-900 text-white text-xs font-semibold rounded-lg transition-colors">
              + Novo Contato
            </button>
          </div>
        </div>`;
    }


    // ── Erro ──
    function renderErro() {
      return `
        <div class="card-anim bg-red-50 rounded-2xl border border-red-200 p-5 flex items-start gap-3">
          <svg class="w-5 h-5 text-red-400 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <div>
            <p class="text-sm font-semibold text-red-700">Falha na consulta ao CRM</p>
            <p class="text-xs text-red-500 mt-0.5">Verifique o console do navegador (F12) para mais detalhes.</p>
          </div>
        </div>`;
    }


    // ============================================================
    // 🚀 BOOTSTRAP — BX24.init
    //
    // A página é aberta diretamente no iframe do Bitrix24 via POST
    // (Cloudflare Tunnel em dev, ZIP local em produção).
    // O BX24.js comunica com o frame pai e obtém auth automaticamente.
    // ============================================================

    let bx24Ready = false;

    function apiCall(method, params = {}) {
      return new Promise((resolve, reject) => {
        BX24.callMethod(method, params, res => {
          if (res.error()) { console.error(`[BX24] ${method}`, res.error()); reject(res.error()); }
          else resolve(res.data());
        });
      });
    }

    function apiBatch(calls) {
      return new Promise(resolve => {
        BX24.callBatch(calls, results => {
          const out = {};
          for (const k in results) {
            if (results[k].error()) {
              console.error(`[BX24 batch] ${k}:`, results[k].error());
              out[k] = { items: [] };
            } else {
              out[k] = results[k].data();
            }
          }
          resolve(out);
        });
      });
    }

    BX24.init(function () {
      bx24Ready = true;
      console.log('🔑 BX24 inicializado | domain:', BX24.getDomain());
      try { BX24.fitWindow(); } catch(e) {}
    });

  </script>
</body>
