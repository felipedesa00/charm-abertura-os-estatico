<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Instalação do App</title>
  <script src="//api.bitrix24.com/api/v1/"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }

    .icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .icon svg {
      width: 32px;
      height: 32px;
      color: #fff;
    }

    .card__title {
      font-size: 22px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 8px;
    }

    .card__subtitle {
      font-size: 14px;
      color: #6b7280;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .features {
      text-align: left;
      background: #f9fafb;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
    }

    .feature {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 13px;
      color: #374151;
      padding: 6px 0;
    }

    .feature svg {
      width: 16px;
      height: 16px;
      color: #10b981;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .alert {
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      margin-bottom: 20px;
      display: none;
    }
    .alert--error   { background: #fef2f2; color: #dc2626; border: 1px solid #fca5a5; display: block; }
    .alert--success { background: #f0fdf4; color: #16a34a; border: 1px solid #86efac; display: block; }
    .alert--loading { background: #eff6ff; color: #2563eb; border: 1px solid #93c5fd; display: block; }

    .btn {
      width: 100%;
      padding: 14px 20px;
      border-radius: 8px;
      border: none;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      background: #2563eb;
      color: #fff;
      transition: background 0.15s, transform 0.1s;
    }
    .btn:hover:not(:disabled) { background: #1d4ed8; }
    .btn:active:not(:disabled) { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .loading-spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      vertical-align: middle;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M13 10V3L4 14h7v7l9-11h-7z" />
      </svg>
    </div>

    <h1 class="card__title">Configurador de Widget</h1>
    <p class="card__subtitle">Crie widgets personalizados para navegar rapidamente entre telas do Bitrix24</p>

    <div class="features">
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
        <span>Escolha qualquer entidade CRM ou SPA</span>
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
        <span>Defina o local do widget (lista, detalhes, timeline)</span>
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
        <span>Configure o caminho de destino (openPath)</span>
      </div>
      <div class="feature">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
        </svg>
        <span>Gerencie widgets instalados facilmente</span>
      </div>
    </div>

    <div class="alert" id="alert-box"></div>

    <button class="btn" id="btn-install" disabled>
      <span id="btn-text">Instalar Aplicativo</span>
    </button>
  </div>

  <script>
    var alertBox = document.getElementById('alert-box');
    var btnInstall = document.getElementById('btn-install');
    var btnText = document.getElementById('btn-text');

    function showAlert(msg, type) {
      alertBox.textContent = msg;
      alertBox.className = 'alert alert--' + type;
    }

    function setLoading(isLoading) {
      btnInstall.disabled = isLoading;
      btnText.innerHTML = isLoading
        ? '<span class="loading-spinner"></span>Instalando...'
        : 'Instalar Aplicativo';
    }

    BX24.init(function() {
      btnInstall.disabled = false;

      btnInstall.addEventListener('click', function() {
        setLoading(true);
        showAlert('Finalizando instalação...', 'loading');

        // No widgets are registered during install
        // User will configure widgets through the main interface (index.html)
        setTimeout(function() {
          showAlert('Aplicativo instalado! Abrindo configurador...', 'success');
          setTimeout(function() {
            BX24.installFinish();
          }, 1000);
        }, 500);
      });
    });
  </script>
</body>
</html>
